<head>

    <meta name="theme-color" content="#0f1115">
    <title>Guardian Angel DMS</title>
    <link rel="icon" href="/images/favicon-48.png" sizes="48x48" type="image/png">
    <link rel="icon" href="/images/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" sizes="180x180">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "accent-amber": "#F59E0B",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0f1115",
                        "surface-dark": "#1a1d24",
                        "surface-darker": "#14161b",
                        "card-dark": "#1a2332",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        /* ── Base ─────────────────────────────────────────────────────────── */
        html {
            height: -webkit-fill-available;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #0f1115;
            color: white;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        /* Remove iOS tap highlight flash */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Scrollbar ────────────────────────────────────────────────────── */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ── iOS Safari: backdrop-filter webkit prefix ────────────────────── */
        /* Tailwind CDN may omit -webkit- prefix; add it statically */
        [class*="backdrop-blur"] {
            -webkit-backdrop-filter: var(--tw-backdrop-blur) var(--tw-backdrop-brightness) var(--tw-backdrop-contrast) var(--tw-backdrop-grayscale) var(--tw-backdrop-hue-rotate) var(--tw-backdrop-invert) var(--tw-backdrop-opacity) var(--tw-backdrop-saturate) var(--tw-backdrop-sepia);
            backdrop-filter: var(--tw-backdrop-blur) var(--tw-backdrop-brightness) var(--tw-backdrop-contrast) var(--tw-backdrop-grayscale) var(--tw-backdrop-hue-rotate) var(--tw-backdrop-invert) var(--tw-backdrop-opacity) var(--tw-backdrop-saturate) var(--tw-backdrop-sepia);
        }

        /* ── iOS Safari: min-height viewport fix ─────────────────────────── */
        .min-h-screen {
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }

        /* ── Pulse ring animation ─────────────────────────────────────────── */
        .pulse-ring {
            box-shadow: 0 0 0 0 rgba(23, 84, 207, 0.7);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(23, 84, 207, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(23, 84, 207, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(23, 84, 207, 0);
            }
        }

        /* ── Tailwind animate-in/out — pre-defined for iOS Safari ─────────
           Tailwind CDN injects these AFTER React renders. On iOS Safari,
           dynamically-injected animation CSS won't re-trigger for elements
           already in the DOM, leaving them permanently at opacity:0.
           Defining keyframes here (before React renders) fixes that.
        ──────────────────────────────────────────────────────────────────── */
        :root {
            --tw-enter-opacity: 1;
            --tw-enter-scale: 1;
            --tw-enter-rotate: 0deg;
            --tw-enter-translate-x: 0;
            --tw-enter-translate-y: 0;
            --tw-exit-opacity: 1;
            --tw-exit-scale: 1;
            --tw-exit-rotate: 0deg;
            --tw-exit-translate-x: 0;
            --tw-exit-translate-y: 0;
        }

        @keyframes enter {
            from {
                opacity: var(--tw-enter-opacity, 1);
                transform: translate3d(var(--tw-enter-translate-x, 0), var(--tw-enter-translate-y, 0), 0)
                           scale3d(var(--tw-enter-scale, 1), var(--tw-enter-scale, 1), var(--tw-enter-scale, 1))
                           rotate(var(--tw-enter-rotate, 0deg));
            }
        }

        @keyframes exit {
            to {
                opacity: var(--tw-exit-opacity, 1);
                transform: translate3d(var(--tw-exit-translate-x, 0), var(--tw-exit-translate-y, 0), 0)
                           scale3d(var(--tw-exit-scale, 1), var(--tw-exit-scale, 1), var(--tw-exit-scale, 1))
                           rotate(var(--tw-exit-rotate, 0deg));
            }
        }

        .animate-in {
            animation-name: enter;
            animation-fill-mode: both;
        }

        .animate-out {
            animation-name: exit;
            animation-fill-mode: both;
        }

        /* fade */
        .fade-in  { --tw-enter-opacity: 0; }
        .fade-out { --tw-exit-opacity: 0; }

        /* zoom */
        .zoom-in-95  { --tw-enter-scale: .95; }
        .zoom-out-95 { --tw-exit-scale: .95; }

        /* slide */
        .slide-in-from-bottom-2 { --tw-enter-translate-y:  0.5rem; }
        .slide-in-from-bottom-4 { --tw-enter-translate-y:  1rem; }
        .slide-in-from-bottom-8 { --tw-enter-translate-y:  2rem; }
        .slide-out-to-bottom-2  { --tw-exit-translate-y:   0.5rem; }
        .slide-out-to-bottom-4  { --tw-exit-translate-y:   1rem; }

        /* duration */
        .duration-150       { animation-duration: 150ms; }
        .duration-200       { animation-duration: 200ms; }
        .duration-300       { animation-duration: 300ms; }
        .duration-500       { animation-duration: 500ms; }
        .duration-700       { animation-duration: 700ms; }
        .duration-\[180ms\] { animation-duration: 180ms; }
    </style>

{

  }
}
